<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お問い合わせ | 恵寿起工業株式会社</title>
    <meta name="description" content="開発相談・OEM相談・見積依頼の問い合わせフォームです。企画段階からご相談いただけます。" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header"><div class="container header-inner"><a class="logo" href="../index.html">恵寿起工業株式会社</a></div></header>
    <main>
      <section class="hero"><div class="container"><h1>お問い合わせ</h1><p>開発相談・OEM相談・見積依頼を受け付けています。医療・介護機器関連案件を優先対応します。</p></div></section>
      <section>
        <div class="container">
          <div class="hero-actions">
            <a class="btn btn-primary" href="#form">開発相談する</a>
            <a class="btn btn-outline" href="#form">OEM相談する</a>
            <a class="btn btn-outline" href="#form">見積を依頼する</a>
          </div>
          <p class="section-lead">TEL: 06-6705-3039（平日 9:00-17:00）</p>
          <form id="form" class="form-grid">
            <div>
              <label for="kind">お問い合わせ種別</label>
              <select id="kind" name="kind">
                <option>開発相談</option>
                <option>OEM相談</option>
                <option>見積依頼</option>
                <option>その他</option>
              </select>
            </div>
            <div>
              <label for="company">会社名</label>
              <input id="company" name="company" type="text" placeholder="株式会社〇〇" />
            </div>
            <div>
              <label for="name">ご担当者名</label>
              <input id="name" name="name" type="text" placeholder="山田 太郎" />
            </div>
            <div>
              <label for="mail">メールアドレス</label>
              <input id="mail" name="mail" type="email" placeholder="example@company.co.jp" />
            </div>
            <div>
              <label for="tel">電話番号</label>
              <input id="tel" name="tel" type="tel" placeholder="06-0000-0000" />
            </div>
            <div>
              <label for="msg">ご相談内容</label>
              <textarea id="msg" name="msg" placeholder="用途、課題、希望納期、数量などをご記入ください。"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">送信（仮）</button>
          </form>
          <p>送信時点で、プライバシーポリシーに同意したものとみなします。（仮テキスト）</p>
        </div>
      </section>
    </main>
    <footer class="site-footer"><div class="container"><small>&copy; <span data-current-year></span> 恵寿起工業株式会社</small></div></footer>
    <div class="sticky-cta"><a href="./contact.html">開発相談</a><a href="./contact.html">OEM相談</a><a href="./contact.html">見積依頼</a></div>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
